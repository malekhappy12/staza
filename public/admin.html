<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: url('background.jpg') no-repeat center center/cover;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        select, input, button {
            display: block;
            width: calc(100% - 20px);
            margin: 10px auto;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background-color: #007bff;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .message {
            margin-top: 10px;
            font-size: 14px;
        }
        .success {
            color: green;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Admin Panel</h2>
        <label for="userSelect">Select User:</label>
        <select id="userSelect" onchange="fetchBalance()">
            <option value="">Loading...</option>
        </select>

        <p>Balance: <span id="userBalance">0.00 ₴</span></p>

        <input type="number" id="amount" placeholder="Enter Amount (+ or -)">
        <button onclick="updateBalance()">Update Balance</button>
        <button id="deleteUserBtn" style="background-color: #dc3545; color: white; margin-top: 10px;">
            Delete Selected User
          </button>

        <p class="message" id="message"></p>
        <a href="/home.html">Back to Home</a>
    </div>

    <script>
        // Load all users into the dropdown
        function deleteUser() {
    const username = document.getElementById("userSelect").value;
    if (!username) return;

    if (!confirm(`Really delete user “${username}”? This cannot be undone.`)) {
      return;
    }

    fetch('/delete-user', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username })
    })
    .then(async response => {
      const data = await response.json();
      const msgEl = document.getElementById("message");
      if (response.ok) {
        msgEl.textContent = data.message;
        msgEl.className = "message success";
        fetchUsers();           // refresh the dropdown
        document.getElementById("amount").value = ""; 
        document.getElementById("userBalance").textContent = "0.00 ₴";
      } else {
        msgEl.textContent = data.error || data.message;
        msgEl.className = "message error";
      }
    })
    .catch(error => console.error("Error deleting user:", error));
  }

  // Wire it up alongside your other listeners
  document.addEventListener("DOMContentLoaded", () => {
    // existing: fetchUsers(), etc.
    document.getElementById("deleteUserBtn")
            .addEventListener("click", deleteUser);
  });

        function fetchUsers() {
            fetch('/get-users')
                .then(response => response.json())
                .then(users => {
                    const userSelect = document.getElementById("userSelect");
                    userSelect.innerHTML = ""; // Clear previous options

                    users.forEach(username => {
                        const option = document.createElement("option");
                        option.value = username;
                        option.textContent = username;
                        userSelect.appendChild(option);
                    });

                    if (users.length > 0) {
                        fetchBalance(); // Fetch balance of first user automatically
                    }
                })
                .catch(error => console.error("Error fetching users:", error));
        }

        // Fetch balance for the selected user
        function fetchBalance() {
            const username = document.getElementById("userSelect").value;
            if (!username) return;

            fetch(`/get-balance/${username}`)
                .then(response => response.json())
                .then(data => {
                    if (data.balance !== undefined) {
                        document.getElementById("userBalance").textContent = `${data.balance.toFixed(2)} ₴`;
                    } else {
                        document.getElementById("userBalance").textContent = "Error fetching balance";
                    }
                })
                .catch(error => console.error("Error fetching balance:", error));
        }

        // Update balance for the selected user
        function updateBalance() {
            const username = document.getElementById("userSelect").value;
            const amount = parseFloat(document.getElementById("amount").value);

            if (!username || isNaN(amount)) {
                document.getElementById("message").textContent = "Invalid input!";
                document.getElementById("message").className = "message error";
                return;
            }

            fetch('/update-balance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, amount })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("message").textContent = data.message;
                document.getElementById("message").className = data.error ? "message error" : "message success";
                fetchBalance(); // Refresh balance after update
            })
            .catch(error => console.error("Error updating balance:", error));
        }

        // Initial fetch when the page loads
        document.addEventListener("DOMContentLoaded", fetchUsers);
    </script>
</body>
</html>
